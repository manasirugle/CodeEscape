<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SYSTEM IDENTITY REGISTRATION | CodeEscape</title>
    <meta name="description"
        content="Cyberpunk escape room identity registration system. Create your operative profile to enter the high-tech escape room." />
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --neon-cyan: #00f5ff;
            --neon-blue: #0066ff;
            --neon-green: #00ff88;
            --neon-purple: #bf00ff;
            --dark-bg: #020810;
            --panel-bg: rgba(0, 20, 45, 0.55);
            --border-glow: rgba(0, 245, 255, 0.6);
            --text-primary: #e0f8ff;
            --text-dim: #6ab0c8;
        }

        html,
        body {
            min-height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: var(--dark-bg);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* ── CANVAS BACKGROUND ── */
        #bg-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
        }

        /* ── SCANLINES OVERLAY ── */
        .scanlines {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 0, 0, .15) 2px, rgba(0, 0, 0, .15) 4px);
            animation: scanMove 8s linear infinite;
        }

        @keyframes scanMove {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 0 100px;
            }
        }

        /* ── CORNER DECORATIONS ── */
        .corner {
            position: fixed;
            width: 80px;
            height: 80px;
            z-index: 2;
            pointer-events: none;
        }

        .corner-tl {
            top: 16px;
            left: 16px;
            border-top: 2px solid var(--neon-cyan);
            border-left: 2px solid var(--neon-cyan);
            box-shadow: inset 2px 2px 8px rgba(0, 245, 255, .2);
        }

        .corner-tr {
            top: 16px;
            right: 16px;
            border-top: 2px solid var(--neon-cyan);
            border-right: 2px solid var(--neon-cyan);
        }

        .corner-bl {
            bottom: 16px;
            left: 16px;
            border-bottom: 2px solid var(--neon-cyan);
            border-left: 2px solid var(--neon-cyan);
        }

        .corner-br {
            bottom: 16px;
            right: 16px;
            border-bottom: 2px solid var(--neon-cyan);
            border-right: 2px solid var(--neon-cyan);
        }

        /* ── HUD BARS ── */
        .hud-top {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 3;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: linear-gradient(90deg, rgba(0, 102, 255, .15), rgba(0, 245, 255, .08), rgba(0, 102, 255, .15));
            border-bottom: 1px solid rgba(0, 245, 255, .25);
            font-size: .6rem;
            color: var(--neon-cyan);
            letter-spacing: .12em;
        }

        .hud-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 3;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: linear-gradient(90deg, rgba(0, 102, 255, .12), rgba(0, 245, 255, .06), rgba(0, 102, 255, .12));
            border-top: 1px solid rgba(0, 245, 255, .2);
            font-size: .55rem;
            color: var(--text-dim);
            letter-spacing: .1em;
        }

        .hud-dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--neon-green);
            animation: blink 1.4s ease-in-out infinite;
            margin-right: 6px;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .2;
            }
        }

        .hud-dot.amber {
            background: #ffaa00;
            animation-delay: .5s;
        }

        .hud-dot.red {
            background: #ff3355;
            animation-delay: .9s;
        }

        /* ── MAIN PANEL ── */
        .panel-wrap {
            position: relative;
            z-index: 10;
            width: min(640px, 96vw);
            margin: 40px auto;
        }

        .panel {
            background: var(--panel-bg);
            border: 1px solid rgba(0, 245, 255, .35);
            border-radius: 4px;
            backdrop-filter: blur(18px) saturate(1.4);
            -webkit-backdrop-filter: blur(18px) saturate(1.4);
            box-shadow:
                0 0 40px rgba(0, 102, 255, .25),
                0 0 80px rgba(0, 245, 255, .08),
                inset 0 0 60px rgba(0, 20, 60, .4);
            padding: 32px 36px 36px;
            position: relative;
            overflow: hidden;
            animation: flickerPanel 8s ease-in-out infinite;
        }

        @keyframes flickerPanel {

            0%,
            95%,
            100% {
                opacity: 1;
            }

            96% {
                opacity: .92;
            }

            97% {
                opacity: 1;
            }

            98% {
                opacity: .88;
            }

            99% {
                opacity: 1;
            }
        }

        .panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, .04), transparent);
            animation: sweep 5s ease-in-out infinite;
        }

        @keyframes sweep {
            0% {
                left: -100%;
            }

            100% {
                left: 200%;
            }
        }

        /* panel top accent line */
        .panel-accent {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-green), var(--neon-cyan), transparent);
            animation: accentPulse 3s ease-in-out infinite;
        }

        @keyframes accentPulse {

            0%,
            100% {
                opacity: .7;
            }

            50% {
                opacity: 1;
            }
        }

        /* ── HEADER ── */
        .panel-header {
            text-align: center;
            margin-bottom: 24px;
        }

        .sys-label {
            font-size: .6rem;
            letter-spacing: .25em;
            color: var(--neon-green);
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .main-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1rem, 3vw, 1.3rem);
            font-weight: 900;
            letter-spacing: .15em;
            color: var(--neon-cyan);
            text-shadow: 0 0 20px var(--neon-cyan), 0 0 40px rgba(0, 245, 255, .5);
            min-height: 1.6em;
        }

        .subtitle-typed {
            font-size: .72rem;
            letter-spacing: .12em;
            color: var(--text-dim);
            min-height: 1.4em;
            margin-top: 4px;
        }

        .cursor-blink {
            display: inline-block;
            width: 8px;
            height: 1em;
            background: var(--neon-cyan);
            margin-left: 2px;
            animation: cursorBlink .7s step-end infinite;
            vertical-align: text-bottom;
        }

        @keyframes cursorBlink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        /* ── STATUS BAR ── */
        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 245, 255, .05);
            border: 1px solid rgba(0, 245, 255, .2);
            border-radius: 2px;
            padding: 8px 14px;
            margin-bottom: 28px;
            font-size: .65rem;
            letter-spacing: .15em;
            color: var(--neon-green);
            text-transform: uppercase;
        }

        .status-bar .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--neon-green);
            box-shadow: 0 0 8px var(--neon-green);
            animation: pulseGlow 1.2s ease-in-out infinite;
            flex-shrink: 0;
        }

        @keyframes pulseGlow {

            0%,
            100% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(1.4);
                opacity: .6;
            }
        }

        #status-text {
            flex: 1;
        }

        .status-bar .progress-seg {
            display: flex;
            gap: 3px;
        }

        .seg {
            width: 18px;
            height: 4px;
            background: rgba(0, 245, 255, .2);
            border-radius: 1px;
            transition: background .4s;
        }

        .seg.filled {
            background: var(--neon-cyan);
            box-shadow: 0 0 6px var(--neon-cyan);
        }

        /* ── FORM GRID ── */
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 22px;
        }

        /* ── AVATAR SECTION ── */
        .avatar-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 14px;
        }

        .avatar-frame-wrap {
            position: relative;
            display: inline-block;
        }

        .avatar-ring {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 2px solid var(--neon-cyan);
            box-shadow: 0 0 16px var(--neon-cyan), 0 0 32px rgba(0, 245, 255, .3), inset 0 0 20px rgba(0, 245, 255, .1);
            position: relative;
            overflow: hidden;
            cursor: pointer;
            background: radial-gradient(circle, rgba(0, 40, 80, .8), rgba(0, 10, 30, .95));
            transition: box-shadow .3s;
        }

        .avatar-ring:hover {
            box-shadow: 0 0 24px var(--neon-cyan), 0 0 60px rgba(0, 245, 255, .5), inset 0 0 30px rgba(0, 245, 255, .2);
            animation: avatarPulse 1s ease-in-out infinite;
        }

        @keyframes avatarPulse {

            0%,
            100% {
                box-shadow: 0 0 24px var(--neon-cyan), 0 0 60px rgba(0, 245, 255, .5);
            }

            50% {
                box-shadow: 0 0 40px var(--neon-cyan), 0 0 80px rgba(0, 245, 255, .7);
            }
        }

        .avatar-ring img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        .avatar-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            color: var(--text-dim);
            font-size: .55rem;
            letter-spacing: .1em;
        }

        .avatar-placeholder svg {
            width: 40px;
            height: 40px;
            opacity: .5;
        }

        .avatar-ring-spinner {
            position: absolute;
            inset: -4px;
            border-radius: 50%;
            border: 2px solid transparent;
            border-top-color: var(--neon-cyan);
            border-right-color: rgba(0, 245, 255, .3);
            animation: spin 3s linear infinite;
            pointer-events: none;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        #avatar-upload-input {
            display: none;
        }

        .upload-btn-label {
            font-size: .62rem;
            letter-spacing: .15em;
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 245, 255, .4);
            padding: 5px 14px;
            border-radius: 2px;
            cursor: pointer;
            transition: all .25s;
            background: rgba(0, 245, 255, .05);
            text-transform: uppercase;
        }

        .upload-btn-label:hover {
            background: rgba(0, 245, 255, .15);
            border-color: var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0, 245, 255, .3);
        }

        /* ── AVATAR GRID ── */
        .avatar-grid-label {
            font-size: .58rem;
            letter-spacing: .18em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .avatar-grid {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .av-opt {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            border: 2px solid rgba(0, 245, 255, .25);
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: all .28s;
            background: radial-gradient(circle, rgba(0, 30, 60, .9), rgba(0, 10, 25, 1));
            image-rendering: pixelated;
        }

        .av-opt img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            image-rendering: pixelated;
            display: block;
        }

        .av-opt:hover {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 16px var(--neon-cyan), 0 0 28px rgba(0, 245, 255, .35);
            transform: scale(1.13);
        }

        .av-opt.selected {
            border-color: var(--neon-green);
            box-shadow: 0 0 20px var(--neon-green), 0 0 36px rgba(0, 255, 136, .45);
        }

        .av-opt .av-check {
            display: none;
            position: absolute;
            inset: 0;
            background: rgba(0, 255, 136, .22);
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            border-radius: 50%;
        }

        .av-opt.selected .av-check {
            display: flex;
        }

        /* Sound toggle */
        #sound-toggle {
            position: fixed;
            top: 42px;
            right: 16px;
            z-index: 20;
            background: rgba(0, 15, 35, .8);
            border: 1px solid rgba(0, 245, 255, .3);
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', monospace;
            font-size: .58rem;
            letter-spacing: .1em;
            padding: 5px 10px;
            cursor: pointer;
            border-radius: 2px;
            transition: all .25s;
        }

        #sound-toggle:hover {
            background: rgba(0, 245, 255, .1);
            border-color: var(--neon-cyan);
        }

        /* Transition flash */
        #transition-flash {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #00f5ff;
            opacity: 0;
            pointer-events: none;
            transition: opacity .35s;
        }

        /* ── INPUT FIELDS ── */
        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-label {
            font-size: .6rem;
            letter-spacing: .2em;
            color: var(--neon-green);
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .field-label::before {
            content: '//';
            color: rgba(0, 255, 136, .5);
        }

        .neon-input {
            width: 100%;
            background: rgba(0, 10, 30, .7);
            border: 1px solid rgba(0, 245, 255, .3);
            border-radius: 2px;
            padding: 11px 14px;
            color: var(--neon-cyan);
            font-family: 'Share Tech Mono', monospace;
            font-size: .85rem;
            letter-spacing: .08em;
            outline: none;
            transition: all .3s;
            caret-color: var(--neon-cyan);
        }

        .neon-input::placeholder {
            color: rgba(0, 180, 200, .35);
            font-size: .75rem;
        }

        .neon-input:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0, 245, 255, .3), inset 0 0 16px rgba(0, 245, 255, .05);
            background: rgba(0, 20, 50, .8);
        }

        .neon-input:focus::placeholder {
            opacity: 0;
        }

        .input-underline {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            opacity: 0;
            transition: opacity .3s;
        }

        .neon-input:focus+.input-underline {
            opacity: 1;
        }

        /* ── ACTION BUTTON ── */
        .action-btn {
            position: relative;
            width: 100%;
            padding: 15px 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: .8rem;
            font-weight: 700;
            letter-spacing: .25em;
            text-transform: uppercase;
            color: var(--neon-cyan);
            background: transparent;
            border: 1px solid var(--neon-cyan);
            border-radius: 2px;
            cursor: pointer;
            overflow: hidden;
            transition: all .35s;
            box-shadow: 0 0 15px rgba(0, 245, 255, .2);
        }

        .action-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(110deg, transparent 30%, rgba(0, 245, 255, .08) 50%, transparent 70%);
            transform: translateX(-100%);
            transition: transform .5s;
        }

        .action-btn:hover::before {
            transform: translateX(100%);
        }

        .action-btn:hover {
            background: rgba(0, 245, 255, .12);
            box-shadow: 0 0 30px rgba(0, 245, 255, .5), 0 0 60px rgba(0, 245, 255, .2);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .action-btn .btn-scanline {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(0, 245, 255, .6), transparent);
            animation: btnScan 2.5s ease-in-out infinite;
            opacity: .5;
        }

        @keyframes btnScan {
            0% {
                top: 0%;
            }

            100% {
                top: 100%;
            }
        }

        .action-btn:disabled {
            opacity: .45;
            cursor: not-allowed;
        }

        .action-btn:active:not(:disabled) {
            transform: scale(.98);
        }

        /* ── SYSTEM MESSAGES ── */
        .sys-messages {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-height: 80px;
            overflow: hidden;
            font-size: .62rem;
            letter-spacing: .1em;
            border-top: 1px solid rgba(0, 245, 255, .1);
            padding-top: 12px;
        }

        .sys-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            animation: msgSlide .4s ease-out forwards;
            color: var(--text-dim);
        }

        @keyframes msgSlide {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: none;
            }
        }

        .sys-msg .msg-icon {
            flex-shrink: 0;
            font-size: .7rem;
        }

        .sys-msg.warn {
            color: #ffaa00;
        }

        .sys-msg.success {
            color: var(--neon-green);
        }

        .sys-msg.error {
            color: #ff3355;
        }

        .sys-msg.info {
            color: var(--neon-cyan);
        }

        /* ── VERIFIED OVERLAY ── */
        #verified-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0, 5, 20, .92);
            backdrop-filter: blur(12px);
        }

        #verified-overlay.show {
            display: flex;
            animation: overlayIn .6s ease-out;
        }

        @keyframes overlayIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .verified-ring {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            border: 3px solid var(--neon-green);
            box-shadow: 0 0 40px var(--neon-green), 0 0 80px rgba(0, 255, 136, .4);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: verifiedPulse 1.5s ease-in-out infinite;
            position: relative;
            overflow: hidden;
        }

        .verified-ring img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }

        @keyframes verifiedPulse {

            0%,
            100% {
                box-shadow: 0 0 40px var(--neon-green), 0 0 80px rgba(0, 255, 136, .4);
            }

            50% {
                box-shadow: 0 0 60px var(--neon-green), 0 0 120px rgba(0, 255, 136, .6);
            }
        }

        .verified-title {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.3rem, 5vw, 2rem);
            font-weight: 900;
            letter-spacing: .2em;
            color: var(--neon-green);
            text-shadow: 0 0 30px var(--neon-green);
            margin: 24px 0 8px;
            animation: glitchText 3s ease-in-out infinite;
        }

        @keyframes glitchText {

            0%,
            90%,
            100% {
                text-shadow: 0 0 30px var(--neon-green);
            }

            92% {
                text-shadow: -3px 0 #ff3355, 3px 0 var(--neon-cyan);
            }

            94% {
                text-shadow: 0 0 30px var(--neon-green);
            }

            96% {
                text-shadow: 3px 0 #ff3355, -3px 0 var(--neon-cyan);
            }
        }

        .verified-sub {
            font-size: .7rem;
            letter-spacing: .2em;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .verified-agent {
            font-size: .85rem;
            letter-spacing: .15em;
            color: var(--neon-cyan);
            margin-bottom: 4px;
        }

        .verified-age {
            font-size: .65rem;
            letter-spacing: .12em;
            color: var(--text-dim);
            margin-bottom: 28px;
        }

        .enter-btn {
            font-family: 'Orbitron', sans-serif;
            font-size: .75rem;
            font-weight: 700;
            letter-spacing: .25em;
            padding: 14px 40px;
            background: rgba(0, 255, 136, .1);
            border: 1px solid var(--neon-green);
            color: var(--neon-green);
            border-radius: 2px;
            cursor: pointer;
            transition: all .3s;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 136, .15), transparent);
            animation: sweep 2.2s ease-in-out infinite;
        }

        .enter-btn:hover {
            background: rgba(0, 255, 136, .25);
            box-shadow: 0 0 30px var(--neon-green), 0 0 60px rgba(0, 255, 136, .25);
        }

        /* ── SCREEN PULSE ── */
        .screen-pulse {
            position: fixed;
            inset: 0;
            z-index: 90;
            pointer-events: none;
            background: radial-gradient(circle, rgba(0, 245, 255, .15), transparent 70%);
            opacity: 0;
        }

        .screen-pulse.active {
            animation: screenPulse 1s ease-out forwards;
        }

        @keyframes screenPulse {
            0% {
                opacity: 0;
            }

            30% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }

        /* ── RESPONSIVE ── */
        @media(max-width:480px) {
            .panel {
                padding: 20px 16px 24px;
            }

            .main-title {
                font-size: .9rem;
            }

            .av-opt {
                width: 44px;
                height: 44px;
            }
        }
    </style>
</head>

<body>

    <!-- HUD chrome -->
    <div class="hud-top">
        <span><span class="hud-dot"></span>SYS_ONLINE</span>
        <span>CODEESCAPE // OP-CENTER v4.2.1</span>
        <span><span class="hud-dot amber"></span>SECTOR-7 ACTIVE</span>
    </div>
    <div class="hud-bottom">
        <span>LAT:28.6139 LON:77.2090</span>
        <span id="hud-clock">--:--:--</span>
        <span><span class="hud-dot red"></span>CLASSIFIED // EYES ONLY</span>
    </div>

    <!-- Corner decorations -->
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <!-- Sound Toggle -->
    <button id="sound-toggle" onclick="toggleSound()">🔇 AMBIENT OFF</button>

    <!-- Canvas for particles + server rack BG -->
    <canvas id="bg-canvas"></canvas>
    <div class="scanlines"></div>
    <div class="screen-pulse" id="screen-pulse"></div>
    <div id="transition-flash"></div>

    <!-- MAIN PANEL -->
    <div class="panel-wrap">
        <div class="panel">
            <div class="panel-accent"></div>

            <!-- Header -->
            <div class="panel-header">
                <div class="sys-label">// CODEESCAPE NETWORK //</div>
                <div class="main-title" id="main-title"></div>
                <div class="subtitle-typed" id="subtitle-typed"><span class="cursor-blink"></span></div>
            </div>

            <!-- Status Bar -->
            <div class="status-bar">
                <div class="pulse-dot"></div>
                <span id="status-text">AWAITING USER IDENTITY</span>
                <div class="progress-seg">
                    <div class="seg" id="seg0"></div>
                    <div class="seg" id="seg1"></div>
                    <div class="seg" id="seg2"></div>
                    <div class="seg" id="seg3"></div>
                </div>
            </div>

            <!-- Form -->
            <div class="form-grid">

                <!-- Avatar -->
                <div class="avatar-section">
                    <div class="avatar-frame-wrap">
                        <div class="avatar-ring" id="avatar-ring"
                            onclick="document.getElementById('avatar-upload-input').click()">
                            <div class="avatar-placeholder" id="avatar-placeholder">
                                <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                                    <circle cx="24" cy="18" r="10" stroke="#00f5ff" stroke-width="1.5" />
                                    <path d="M6 42c0-9.941 8.059-18 18-18s18 8.059 18 18" stroke="#00f5ff"
                                        stroke-width="1.5" stroke-linecap="round" />
                                </svg>
                                <span>UPLOAD AVATAR</span>
                            </div>
                            <img id="avatar-preview" src="" alt="avatar" style="display:none;" />
                        </div>
                        <div class="avatar-ring-spinner"></div>
                    </div>
                    <input type="file" id="avatar-upload-input" accept="image/*" />
                    <label for="avatar-upload-input" class="upload-btn-label">[ SELECT FILE ]</label>

                    <div class="avatar-grid-label">— OR CHOOSE OPERATIVE —</div>
                    <div class="avatar-grid" id="avatar-grid"></div>
                </div>

                <!-- Name -->
                <div class="field-group">
                    <label class="field-label" for="agent-name">Agent Name</label>
                    <input class="neon-input" id="agent-name" type="text" placeholder="Enter your identity"
                        maxlength="28" autocomplete="off" />
                    <div class="input-underline"></div>
                </div>

                <!-- Age -->
                <div class="field-group">
                    <label class="field-label" for="agent-age">Declare Identity</label>
                    <input class="neon-input" id="agent-age" type="number" placeholder="Enter your age" min="1"
                        max="120" autocomplete="off" />
                    <div class="input-underline"></div>
                </div>

                <!-- Button -->
                <button class="action-btn" id="init-btn" onclick="initIdentity()">
                    <div class="btn-scanline"></div>
                    INITIALIZE IDENTITY
                </button>

                <!-- System messages -->
                <div class="sys-messages" id="sys-messages"></div>
            </div>
        </div>
    </div>

    <!-- VERIFIED OVERLAY -->
    <div id="verified-overlay">
        <div class="verified-ring">
            <img id="verified-avatar" src="" alt="operative" />
        </div>
        <div class="verified-title">IDENTITY VERIFIED</div>
        <div class="verified-sub">ACCESS GRANTED // CLEARANCE LEVEL 5</div>
        <div class="verified-agent" id="verified-agent-name"></div>
        <div class="verified-age" id="verified-agent-age"></div>
        <button class="enter-btn" onclick="enterGame()">ENTER THE SYSTEM ›</button>
    </div>

    <script>
        // ── CLOCK ──
        function updateClock() {
            const d = new Date();
            document.getElementById('hud-clock').textContent =
                d.getHours().toString().padStart(2, '0') + ':' +
                d.getMinutes().toString().padStart(2, '0') + ':' +
                d.getSeconds().toString().padStart(2, '0');
        }
        setInterval(updateClock, 1000); updateClock();

        // ── TYPING ANIMATION ──
        const lines = [
            { el: 'main-title', text: 'SYSTEM IDENTITY REGISTRATION', speed: 60 },
            { el: 'subtitle-typed', text: 'New operative detected...', speed: 55 },
        ];
        function typeText(elId, text, speed, cb) {
            const el = document.getElementById(elId);
            let i = 0; el.innerHTML = '';
            const cur = '<span class="cursor-blink"></span>';
            const timer = setInterval(() => {
                el.innerHTML = text.slice(0, ++i) + cur;
                if (i >= text.length) { clearInterval(timer); if (cb) setTimeout(cb, 400); }
            }, speed);
        }
        setTimeout(() => typeText('main-title', lines[0].text, lines[0].speed,
            () => typeText('subtitle-typed', lines[1].text, lines[1].speed)), 600);

        // ── AVATAR GRID — real pixel art images ──
        const AVATARS = [
            { id: 'wizard', label: 'Wizard', src: 'avatars/wizard.png', color: '#00f5ff' },
            { id: 'developer', label: 'Developer', src: 'avatars/developer.png', color: '#bf00ff' },
            { id: 'knight', label: 'Knight', src: 'avatars/knight.png', color: '#00ff88' },
            { id: 'robot', label: 'Robot', src: 'avatars/robot.png', color: '#00c8ff' },
            { id: 'cathacker', label: 'CatHacker', src: 'avatars/cathacker.png', color: '#ffaa00' },
        ];
        let selectedAvatarSrc = '';
        let selectedAvatarId = '';

        const grid = document.getElementById('avatar-grid');
        AVATARS.forEach(av => {
            const wrap = document.createElement('div');
            wrap.className = 'av-opt';
            wrap.id = 'av-' + av.id;
            wrap.title = av.label;
            wrap.innerHTML = `<img src="${av.src}" alt="${av.label}"/><div class="av-check">✓</div>`;
            wrap.addEventListener('click', () => selectGridAvatar(av, wrap));
            grid.appendChild(wrap);
        });

        function selectGridAvatar(av, el) {
            document.querySelectorAll('.av-opt').forEach(d => { d.classList.remove('selected'); d.style.borderColor = 'rgba(0,245,255,.25)'; });
            el.classList.add('selected');
            el.style.borderColor = av.color;
            selectedAvatarId = av.id;
            selectedAvatarSrc = av.src;
            document.getElementById('avatar-placeholder').style.display = 'none';
            const prev = document.getElementById('avatar-preview');
            prev.src = av.src; prev.style.display = 'block';
            const ring = document.getElementById('avatar-ring');
            ring.style.borderColor = av.color;
            ring.style.boxShadow = `0 0 20px ${av.color},0 0 40px ${av.color}44`;
            addMsg('info', '▶ Operative profile loaded: ' + av.label);
            updateProgress();
            playClick();
        }

        // ── FILE UPLOAD ──
        document.getElementById('avatar-upload-input').addEventListener('change', function () {
            if (!this.files || !this.files[0]) return;
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('avatar-placeholder').style.display = 'none';
                const prev = document.getElementById('avatar-preview');
                prev.src = e.target.result; prev.style.display = 'block';
                document.querySelectorAll('.av-opt').forEach(d => d.classList.remove('selected'));
                selectedAvatarId = 'custom'; selectedAvatarSrc = e.target.result;
                const ring = document.getElementById('avatar-ring');
                ring.style.borderColor = 'var(--neon-cyan)';
                ring.style.boxShadow = '0 0 20px var(--neon-cyan),0 0 40px rgba(0,245,255,.44)';
                addMsg('info', '▶ Custom avatar uploaded');
                updateProgress(); playClick();
            };
            reader.readAsDataURL(this.files[0]);
        });

        // ── PROGRESS SEGMENTS ──
        function updateProgress() {
            const name = document.getElementById('agent-name').value.trim();
            const age = document.getElementById('agent-age').value.trim();
            const hasAvatar = selectedAvatarId !== '';
            const filled = [hasAvatar, name.length > 0, name.length >= 3, age !== '' && age > 0];
            filled.forEach((f, i) => {
                const seg = document.getElementById('seg' + i);
                seg.classList.toggle('filled', f);
            });
            const count = filled.filter(Boolean).length;
            const statuses = ['AWAITING USER IDENTITY', 'PARTIAL DATA RECEIVED', 'IDENTITY COMPILING...', 'READY TO INITIALIZE'];
            document.getElementById('status-text').textContent = statuses[count] || statuses[3];
        }
        document.getElementById('agent-name').addEventListener('input', () => { updateProgress(); checkRealtime(); });
        document.getElementById('agent-age').addEventListener('input', () => { updateProgress(); checkRealtime(); });

        let realtimeTimer = null;
        function checkRealtime() {
            clearTimeout(realtimeTimer);
            realtimeTimer = setTimeout(() => {
                const name = document.getElementById('agent-name').value.trim();
                const age = document.getElementById('agent-age').value.trim();
                if (name.length === 1) addMsg('warn', '⚠ Identity too short...');
                else if (name.length >= 3 && name.length < 5) addMsg('info', '▶ Verifying input...');
            }, 600);
        }

        // ── MESSAGES ──
        const msgs = document.getElementById('sys-messages');
        function addMsg(type, text) {
            const d = document.createElement('div');
            d.className = 'sys-msg ' + type;
            const ts = new Date().toLocaleTimeString('en-GB', { hour12: false });
            d.innerHTML = `<span class="msg-icon">${type === 'success' ? '✔' : type === 'error' ? '✖' : type === 'warn' ? '⚠' : '▶'}</span><span>[${ts}] ${text}</span>`;
            msgs.appendChild(d);
            while (msgs.children.length > 4) msgs.removeChild(msgs.firstChild);
            msgs.scrollTop = msgs.scrollHeight;
        }

        // ── INIT IDENTITY ──
        async function initIdentity() {
            const name = document.getElementById('agent-name').value.trim();
            const age = document.getElementById('agent-age').value.trim();
            if (!selectedAvatarId) { addMsg('warn', '⚠ Identity incomplete — avatar required'); triggerGlitch(); return; }
            if (!name || name.length < 3) { addMsg('warn', '⚠ Identity incomplete — name too short'); triggerGlitch(); return; }
            if (!age || +age < 1 || +age > 120) { addMsg('warn', '⚠ Identity incomplete — invalid age declared'); triggerGlitch(); return; }
            const btn = document.getElementById('init-btn');
            btn.disabled = true; btn.innerHTML = 'VERIFYING...';
            addMsg('info', '▶ Initiating identity scan...');
            playVerify();
            await delay(600); addMsg('info', '▶ Biometric signature processing...');
            await delay(700); addMsg('info', '▶ Cross-referencing operative database...');
            await delay(900); addMsg('success', '✔ Identity accepted');
            await delay(500);
            document.getElementById('screen-pulse').classList.add('active');
            setTimeout(() => document.getElementById('screen-pulse').classList.remove('active'), 1000);
            await delay(800);
            showVerified(name, age);
        }

        function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

        function showVerified(name, age) {
            const overlay = document.getElementById('verified-overlay');
            document.getElementById('verified-avatar').src = document.getElementById('avatar-preview').src;
            document.getElementById('verified-agent-name').textContent = 'OPERATIVE: ' + name.toUpperCase();
            document.getElementById('verified-agent-age').textContent = 'AGE: ' + age + ' // CLEARANCE APPROVED';
            overlay.classList.add('show');
        }

        async function enterGame() {
            sessionStorage.setItem('operative', JSON.stringify({
                name: document.getElementById('agent-name').value.trim(),
                age: document.getElementById('agent-age').value.trim(),
                avatarSrc: selectedAvatarSrc, avatarId: selectedAvatarId
            }));
            const flash = document.getElementById('transition-flash');
            flash.style.opacity = '1';
            await delay(380);
            window.location.href = 'game.html';
        }

        // ── GLITCH ──
        function triggerGlitch() {
            const panel = document.querySelector('.panel');
            [['-3px'], [' 3px'], ['-1px'], ['0px']].forEach(([x], i) => setTimeout(() => panel.style.transform = `translateX(${x})`, i * 65));
        }

        // ── WEB AUDIO AMBIENT ──
        let audioCtx = null, soundOn = false, droneGain = null, noiseGain = null, subGain = null;
        function initAudio() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const master = audioCtx.createGain(); master.gain.value = 0.15; master.connect(audioCtx.destination);
            // Drone oscillator
            const drone = audioCtx.createOscillator(); drone.type = 'sine'; drone.frequency.value = 55;
            const dFilt = audioCtx.createBiquadFilter(); dFilt.type = 'lowpass'; dFilt.frequency.value = 180;
            droneGain = audioCtx.createGain(); droneGain.gain.value = 0;
            drone.connect(dFilt); dFilt.connect(droneGain); droneGain.connect(master); drone.start();
            // Sub oscillator
            const sub = audioCtx.createOscillator(); sub.type = 'sawtooth'; sub.frequency.value = 27.5;
            const sFilt = audioCtx.createBiquadFilter(); sFilt.type = 'lowpass'; sFilt.frequency.value = 75;
            subGain = audioCtx.createGain(); subGain.gain.value = 0;
            sub.connect(sFilt); sFilt.connect(subGain); subGain.connect(master); sub.start();
            // Noise texture
            const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * 2, audioCtx.sampleRate);
            const d = buf.getChannelData(0);
            for (let i = 0; i < d.length; i++)d[i] = (Math.random() * 2 - 1) * 0.012;
            const nSrc = audioCtx.createBufferSource(); nSrc.buffer = buf; nSrc.loop = true;
            const nFilt = audioCtx.createBiquadFilter(); nFilt.type = 'bandpass'; nFilt.frequency.value = 110; nFilt.Q.value = 0.4;
            noiseGain = audioCtx.createGain(); noiseGain.gain.value = 0;
            nSrc.connect(nFilt); nFilt.connect(noiseGain); noiseGain.connect(master); nSrc.start();
            // LFO tremolo
            const lfo = audioCtx.createOscillator(); lfo.frequency.value = 0.1;
            const lfoG = audioCtx.createGain(); lfoG.gain.value = 7;
            lfo.connect(lfoG); lfoG.connect(drone.frequency); lfo.start();
            // Fade in
            const t = audioCtx.currentTime;
            droneGain.gain.linearRampToValueAtTime(1, t + 3);
            subGain.gain.linearRampToValueAtTime(0.55, t + 3);
            noiseGain.gain.linearRampToValueAtTime(1, t + 2);
        }
        function toggleSound() {
            const btn = document.getElementById('sound-toggle');
            if (!soundOn) {
                initAudio(); soundOn = true; btn.textContent = '🔊 AMBIENT ON';
            } else {
                const t = audioCtx.currentTime;
                if (droneGain) droneGain.gain.linearRampToValueAtTime(0, t + 1);
                if (subGain) subGain.gain.linearRampToValueAtTime(0, t + 1);
                if (noiseGain) noiseGain.gain.linearRampToValueAtTime(0, t + 1);
                soundOn = false; btn.textContent = '🔇 AMBIENT OFF';
            }
        }
        function playClick() {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.frequency.value = 880; o.type = 'square';
            g.gain.setValueAtTime(0.055, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.11);
            o.connect(g); g.connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + 0.12);
        }
        function playVerify() {
            if (!audioCtx) return;
            [330, 440, 550, 660].forEach((f, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.frequency.value = f; o.type = 'sine';
                const t = audioCtx.currentTime + i * 0.13;
                g.gain.setValueAtTime(0.09, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                o.connect(g); g.connect(audioCtx.destination); o.start(t); o.stop(t + 0.22);
            });
        }

        // ── CANVAS: PARTICLES + SERVER RACKS ──
        (function () {
            const canvas = document.getElementById('bg-canvas');
            const ctx = canvas.getContext('2d');
            let W, H, particles = [];

            function resize() {
                W = canvas.width = window.innerWidth;
                H = canvas.height = window.innerHeight;
            }
            window.addEventListener('resize', resize); resize();

            function makeParticle() {
                return {
                    x: Math.random() * W, y: Math.random() * H,
                    r: Math.random() * 1.5 + .3,
                    vx: (Math.random() - .5) * .25,
                    vy: (Math.random() - .5) * .25,
                    alpha: Math.random() * .6 + .2,
                    color: Math.random() > .5 ? '0,245,255' : '0,255,136',
                };
            }
            for (let i = 0; i < 120; i++)particles.push(makeParticle());

            // server rack LEDs config
            const ledRows = Array.from({ length: 22 }, (_, r) => ({
                y: H * .08 + r * (H * .84 / 22),
                leds: Array.from({ length: 8 }, (_, i) => ({ x: i, on: Math.random() > .3, timer: Math.random() * 60 | 0, rate: 20 + Math.random() * 80 | 0 }))
            }));

            function drawServerRack(side) {
                const rW = 60, rH = H * .85, ry = H * .07;
                const rx = side === 'left' ? 20 : W - 80;
                // rack body
                ctx.fillStyle = 'rgba(5,15,30,.9)';
                ctx.strokeStyle = 'rgba(0,245,255,.18)';
                ctx.lineWidth = 1;
                ctx.fillRect(rx, ry, rW, rH);
                ctx.strokeRect(rx, ry, rW, rH);
                // unit dividers
                for (let i = 0; i < 20; i++) {
                    const uy = ry + i * (rH / 20);
                    ctx.strokeStyle = 'rgba(0,245,255,.07)';
                    ctx.beginPath(); ctx.moveTo(rx, uy); ctx.lineTo(rx + rW, uy); ctx.stroke();
                }
                // LEDs
                ledRows.forEach((row, ri) => {
                    row.leds.forEach((led, li) => {
                        led.timer--;
                        if (led.timer <= 0) { led.on = Math.random() > .2; led.timer = led.rate; }
                        if (!led.on) return;
                        const colors = ['#00ff88', '#00f5ff', '#0066ff', '#ffaa00', '#ff3355'];
                        const c = colors[(ri * 3 + li) % colors.length];
                        const lx = rx + (side === 'left' ? 8 : 4) + li * 6.5;
                        const ly = row.y;
                        ctx.beginPath(); ctx.arc(lx, ly, 2.2, 0, Math.PI * 2);
                        ctx.fillStyle = c; ctx.shadowColor = c; ctx.shadowBlur = 6; ctx.fill();
                        ctx.shadowBlur = 0;
                    });
                });
            }

            function drawGrid() {
                ctx.strokeStyle = 'rgba(0,100,180,.07)'; ctx.lineWidth = 1;
                const sz = 48;
                for (let x = 0; x < W; x += sz) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
                for (let y = 0; y < H; y += sz) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
            }

            function draw() {
                ctx.clearRect(0, 0, W, H);

                // dark gradient bg
                const bg = ctx.createRadialGradient(W * .5, H * .5, .1, W * .5, H * .5, W * .8);
                bg.addColorStop(0, '#03142b'); bg.addColorStop(.7, '#010c1c'); bg.addColorStop(1, '#020810');
                ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

                drawGrid();
                drawServerRack('left');
                drawServerRack('right');

                // floor reflection glow
                const floorGrad = ctx.createLinearGradient(0, H * .75, 0, H);
                floorGrad.addColorStop(0, 'rgba(0,102,255,.08)'); floorGrad.addColorStop(1, 'transparent');
                ctx.fillStyle = floorGrad; ctx.fillRect(0, H * .75, W, H * .25);

                // particles
                particles.forEach(p => {
                    p.x += p.vx; p.y += p.vy;
                    if (p.x < 0) p.x = W; if (p.x > W) p.x = 0;
                    if (p.y < 0) p.y = H; if (p.y > H) p.y = 0;
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(${p.color},${p.alpha})`;
                    ctx.shadowColor = `rgba(${p.color},.8)`; ctx.shadowBlur = 4;
                    ctx.fill(); ctx.shadowBlur = 0;
                });

                // occasional global glitch horizontal line
                if (Math.random() < .008) {
                    const gy = Math.random() * H;
                    ctx.fillStyle = 'rgba(0,245,255,.07)';
                    ctx.fillRect(0, gy, W, Math.random() * 3 + 1);
                }

                requestAnimationFrame(draw);
            }
            draw();
        })();

        // ── AMBIENT: occasional random messages ──
        const ambientMsgs = [
            ['info', '▶ Scanning sector 7 for active operatives...'],
            ['info', '▶ Firewall integrity: 98.2%'],
            ['warn', '⚠ Unknown signal detected on subnet 10.0.0.x'],
            ['info', '▶ System clock synchronized'],
            ['info', '▶ Encryption layer active'],
        ];
        let ambIdx = 0;
        setInterval(() => {
            const name = document.getElementById('agent-name').value.trim();
            if (!name) {
                const m = ambientMsgs[ambIdx % ambientMsgs.length]; ambIdx++;
                addMsg(m[0], m[1]);
            }
        }, 8000);

        // initial message
        setTimeout(() => addMsg('info', '▶ New operative terminal initialized'), 1800);
    </script>
</body>

</html>
