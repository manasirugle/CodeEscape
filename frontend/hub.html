<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Escape Room — Mission Hub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet">
    <style>
        :root {
            --green:     #00ff88;
            --green-dim: #00cc6a;
            --red:       #ff3355;
            --amber:     #ffcc44;
            --bg:        #020812;
            --glass:     rgba(4, 18, 44, 0.72);
            --glass-border: rgba(0, 255, 136, 0.3);
            --text:      #cde8d6;
            --text-dim:  #4f8a68;
            --font:      'Share Tech Mono', monospace;
            --font-vt:   'VT323', monospace;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--green);
            font-family: var(--font);
            overflow-x: hidden;
            overflow-y: auto;
            user-select: none;
        }

        /* ======== SCANLINES ======== */
        body::before {
            content: '';
            position: fixed; inset: 0;
            background: repeating-linear-gradient(
                to bottom,
                transparent 0px, transparent 3px,
                rgba(0,0,0,0.14) 3px, rgba(0,0,0,0.14) 4px
            );
            pointer-events: none;
            z-index: 9999;
        }

        /* ======== GRID BG ======== */
        .grid-bg {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
            background-size: 44px 44px;
            z-index: -1;
            animation: gridPulse 8s ease-in-out infinite;
        }
        @keyframes gridPulse { 0%, 100% { opacity: 0.6; } 50% { opacity: 1; } }

        /* ======== PARTICLES ======== */
        #particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
        .particle {
            position: absolute; width: 2px; height: 2px;
            background: var(--green); border-radius: 50%;
            animation: floatUp linear infinite; opacity: 0;
        }
        @keyframes floatUp {
            0%   { transform: translateY(100vh) scale(0); opacity: 0; }
            10%  { opacity: .5; }
            90%  { opacity: .1; }
            100% { transform: translateY(-10px) scale(1.2); opacity: 0; }
        }

        /* ======== HUB CONTENT ======== */
        #app {
            position: relative; z-index: 10;
            max-width: 1200px; margin: 0 auto;
            padding: 4rem 2rem 8rem;
            display: flex; flex-direction: column; align-items: center;
        }

        header { text-align: center; margin-bottom: 3rem; }
        .meta-text {
            font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.25em;
            margin-bottom: 0.8rem; text-transform: uppercase;
        }
        h1 {
            font-family: var(--font-vt);
            font-size: clamp(3rem, 8vw, 5.5rem);
            letter-spacing: 0.1em;
            text-shadow: 0 0 25px var(--green);
            margin-bottom: 0.2rem;
            line-height: 1;
        }
        .subtitle {
            font-size: 1.1rem; letter-spacing: 0.4em;
            color: var(--green-dim); text-transform: uppercase;
            margin-bottom: 2rem;
        }

        /* ======== PROGRESS SECTION ======== */
        .progress-section {
            width: 100%; max-width: 700px;
            margin-bottom: 4.5rem; text-align: center;
        }
        .progress-label {
            font-size: 0.75rem; letter-spacing: 0.2em; margin-bottom: 1rem;
            display: block; color: var(--text-dim);
        }
        .progress-track {
            height: 10px; background: rgba(0,255,136,0.08);
            border: 1px solid rgba(0,255,136,0.2);
            border-radius: 5px; overflow: hidden;
            position: relative;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .progress-fill {
            height: 100%; background: var(--green);
            box-shadow: 0 0 20px var(--green);
            width: 0%; transition: width 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ======== LEVEL GRID ======== */
        .level-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 1.8rem; width: 100%;
        }

        .level-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 1.8rem;
            backdrop-filter: blur(14px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            display: flex; flex-direction: column;
            min-height: 220px;
            overflow: hidden;
        }
        .level-card::before {
            content: ''; position: absolute; inset: 0;
            background: radial-gradient(circle at center, rgba(0,255,136,0.05), transparent);
            opacity: 0; transition: opacity 0.3s;
        }
        .level-card.locked { opacity: 0.3; filter: grayscale(1); pointer-events: none; }
        .level-card:not(.locked):hover {
            border-color: var(--green);
            box-shadow: 0 0 30px rgba(0,255,136,0.2), inset 0 0 15px rgba(0,255,136,0.05);
            transform: translateY(-8px);
        }
        .level-card:not(.locked):hover::before { opacity: 1; }

        .lvl-num {
            font-family: var(--font-vt);
            font-size: 2.2rem; margin-bottom: 0.3rem;
            letter-spacing: 0.1em; color: var(--green);
            text-shadow: 0 0 10px rgba(0,255,136,0.4);
        }
        .lvl-name {
            font-size: 0.9rem; color: var(--text); margin-bottom: 1.2rem;
            height: 2.6rem; overflow: hidden; letter-spacing: 0.05em;
        }
        .card-divider {
            width: 100%; height: 1px;
            background: linear-gradient(90deg, var(--green-dim), transparent);
            margin-bottom: 1.2rem; opacity: 0.4;
        }
        .lvl-skill {
            font-size: 0.68rem; color: var(--text-dim); letter-spacing: 0.12em;
            display: flex; align-items: center; gap: 0.6rem;
            margin-bottom: auto; text-transform: uppercase;
        }
        .lvl-skill span { 
            width: 7px; height: 7px; 
            border: 1px solid var(--green); 
            border-radius: 50%; 
            transition: all 0.3s;
        }
        .level-card.completed .lvl-skill span { 
            background: var(--green); 
            box-shadow: 0 0 8px var(--green); 
            border-color: var(--green);
        }

        .enter-btn {
            margin-top: 1.8rem;
            padding: 0.75rem;
            border: 1px solid var(--green);
            background: transparent;
            color: var(--green);
            font-family: var(--font);
            font-size: 0.8rem;
            letter-spacing: 0.25em;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            position: relative; z-index: 2;
        }
        .enter-btn:hover { 
            background: var(--green); 
            color: var(--bg); 
            box-shadow: 0 0 20px var(--green);
        }

        /* ======== STATUS BAR ======== */
        #status-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.7rem 2rem;
            font-size: 0.65rem; color: var(--text-dim);
            letter-spacing: 0.2em;
            border-top: 1px solid rgba(0,255,136,0.12);
            background: rgba(2,8,18,0.95);
            backdrop-filter: blur(5px);
            z-index: 100;
        }
        #blink-cursor {
            display: inline-block; width: 8px; height: 13px;
            background: var(--green); vertical-align: middle; margin-left: 5px;
            animation: blinkCaret 0.8s step-end infinite;
        }
        @keyframes blinkCaret { 50% { opacity: 0; } }

        /* ======== GLITCH TRANSITION ======== */
        #glitch-overlay {
            position: fixed; inset: 0; z-index: 10000;
            pointer-events: none; display: none;
        }
        #glitch-overlay.active { display: block; }
        .glitch-bar { position: absolute; width: 100%; opacity: 0; }

        @keyframes glitchBar {
          0%   { transform:scaleX(0) translateX(-30px); opacity:1; }
          40%  { transform:scaleX(1.2) translateX(8px);  opacity:.85; }
          70%  { transform:scaleX(.5) translateX(-12px);  opacity:.5; }
          100% { transform:scaleX(0) translateX(18px);  opacity:0; }
        }

        @keyframes cardPulse {
          0%,100% { 
            border-color: rgba(0,255,136,0.3); 
            box-shadow: 0 0 8px rgba(0,255,136,0.08);
          }
          50% { 
            border-color: rgba(0,255,136,0.7); 
            box-shadow: 0 0 22px rgba(0,255,136,0.22);
          }
        }

        @media (max-width: 600px) {
            .level-grid { grid-template-columns: 1fr; }
            h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>

    <div class="grid-bg"></div>
    <div id="particles"></div>
    <div id="glitch-overlay"></div>

    <div id="app">
        <header>
            <div class="meta-text">SYS://12 LEVELS DETECTED</div>
            <h1>CODE ESCAPE ROOM</h1>
            <div class="subtitle">SELECT YOUR MISSION</div>
        </header>

        <div class="progress-section">
            <span class="progress-label">LEVELS COMPLETED: <span id="comp-count">0</span> / 12</span>
            <div class="progress-track">
                <div class="progress-fill" id="progress-fill"></div>
            </div>
        </div>

        <div class="level-grid" id="level-grid">
            <!-- Level cards injected via JavaScript -->
        </div>
    </div>

    <div id="status-bar">
        <span>SYS://ESCAPE_PROTOCOL/HUB</span>
        <span id="status-clock">00:00:00</span>
        <span>MISSION_SELECT v1.0<span id="blink-cursor"></span></span>
    </div>

    <script>
        const LEVELS = [
            { id: 1, name: "Logic Verification", skill: "Pattern Recognition", url: "level1.html" },
            { id: 2, name: "Interface Output", skill: "Print Statements", url: "level2.html" },
            { id: 3, name: "Storage Nodes", skill: "Variables", url: "level3.html" },
            { id: 4, name: "Value Mutation", skill: "Variable Updates", url: "level4.html" },
            { id: 5, name: "String Matrix", skill: "Concatenation", url: "level5.html" },
            { id: 6, name: "Data Stream", skill: "User Input", url: "level6.html" },
            { id: 7, name: "Logic Gates", skill: "Conditionals", url: "level7.html" },
            { id: 8, name: "Bitwise Compare", skill: "Operators", url: "level8.html" },
            { id: 9, name: "Feedback Loops", skill: "While Loops", url: "level9.html" },
            { id: 10, name: "Array Buffers", skill: "Lists/Arrays", url: "level10.html" },
            { id: 11, name: "Protocol Defs", skill: "Functions", url: "level11.html" },
            { id: 12, name: "Core Breach", skill: "System Integration", url: "level12.html" }
        ];

        const INITIAL_STATE = {
            currentLevel: 1,
            startTime: Date.now(),
            lastPlayed: Date.now(),
            levels: {},
            totalWrongAttempts: 0,
            totalTimeSpent: 0
        };

        for (let i = 1; i <= 12; i++) {
            INITIAL_STATE.levels[i] = { completed: false, wrongAttempts: 0, timeSpent: 0, completedAt: null };
        }

        // Initialize/Load state
        function getState() {
            const saved = localStorage.getItem('cer_state');
            if (!saved) {
                localStorage.setItem('cer_state', JSON.stringify(INITIAL_STATE));
                return INITIAL_STATE;
            }
            // Migration check for missing levels if any
            const state = JSON.parse(saved);
            for (let i = 1; i <= 12; i++) {
                if (!state.levels[i]) {
                    state.levels[i] = { completed: false, wrongAttempts: 0, timeSpent: 0, completedAt: null };
                }
            }
            return state;
        }

        function saveState(state) {
            state.lastPlayed = Date.now();
            localStorage.setItem('cer_state', JSON.stringify(state));
        }

        function initHub() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';

            LEVELS.forEach(lvl => {
                const card = document.createElement('div');
                card.id = `level-card-${lvl.id}`;
                card.className = `level-card`;
                
                card.innerHTML = `
                    <div id="badge-${lvl.id}" style="display:none; font-size: 0.6rem; letter-spacing: 0.1em; margin-bottom: 0.5rem; font-weight: bold; text-transform: uppercase;"></div>
                    <div class="lvl-num">LEVEL ${String(lvl.id).padStart(2, '0')}</div>
                    <div class="lvl-name">${lvl.name}</div>
                    <div class="card-divider"></div>
                    <div class="lvl-skill"><span></span>${lvl.skill}</div>
                    
                    <div style="margin-top: 1rem; display: flex; flex-direction: column; gap: 0.2rem; min-height: 2.2rem;">
                        <div id="time-${lvl.id}" style="display:none; font-size: 0.65rem; color: #4f8a68;"></div>
                        <div id="attempts-${lvl.id}" style="display:none; font-size: 0.65rem; color: #4f8a68;"></div>
                    </div>

                    <button id="level-btn-${lvl.id}" class="enter-btn">ENTER →</button>
                `;
                grid.appendChild(card);
            });

            updateLevelStates();
        }

        function updateLevelStates() {
            const state = getState();
            let completedCount = 0;

            for (let n = 1; n <= 12; n++) {
                const btn = document.getElementById('level-btn-' + n);
                const card = document.getElementById('level-card-' + n);
                if (!btn || !card) continue;

                const levelData = state.levels?.[n] || {};
                const isUnlocked = n === 1 || state.levels?.[n - 1]?.completed === true;
                const isCompleted = levelData.completed === true;
                const inProgress  = levelData.started && !levelData.completed;

                if (isCompleted) {
                    completedCount++;
                    card.style.borderColor = 'rgba(0,255,136,0.6)';
                    card.style.boxShadow   = '0 0 18px rgba(0,255,136,0.15)';
                    btn.textContent        = 'REPLAY ↺';
                    btn.style.opacity      = '0.6';
                    btn.style.fontSize     = '0.75rem';
                    btn.onclick            = () => goToLevel(n);

                    const badge = document.getElementById('badge-' + n);
                    if (badge) {
                        badge.textContent   = '✓ CLEARED';
                        badge.style.color   = 'var(--green)';
                        badge.style.display = 'block';
                    }

                    const timeEl = document.getElementById('time-' + n);
                    if (timeEl && levelData.timeSpent) {
                        const mins = Math.floor(levelData.timeSpent / 60000);
                        const secs = Math.floor((levelData.timeSpent % 60000) / 1000);
                        timeEl.textContent = mins + 'm ' + secs + 's';
                        timeEl.style.display = 'block';
                    }

                    const attEl = document.getElementById('attempts-' + n);
                    if (attEl) {
                        attEl.textContent = (levelData.wrongAttempts || 0) + ' wrong attempts';
                        attEl.style.display = 'block';
                    }

                } else if (inProgress) {
                    card.style.borderColor = 'rgba(255,204,68,0.5)';
                    btn.textContent        = 'CONTINUE →';
                    btn.style.color        = 'var(--amber, #ffcc44)';
                    btn.style.borderColor  = 'rgba(255,204,68,0.6)';
                    btn.onclick            = () => goToLevel(n);

                    const badge = document.getElementById('badge-' + n);
                    if (badge) {
                        badge.textContent   = 'IN PROGRESS';
                        badge.style.color   = '#ffcc44';
                        badge.style.display = 'block';
                    }

                } else if (isUnlocked) {
                    btn.textContent = 'ENTER →';
                    btn.onclick     = () => goToLevel(n);
                    card.style.animation = 'cardPulse 2.5s ease-in-out infinite';

                } else {
                    card.style.opacity    = '0.3';
                    card.style.cursor     = 'not-allowed';
                    btn.textContent       = '🔒 LOCKED';
                    btn.disabled          = true;
                    btn.style.opacity     = '0.4';
                    btn.style.cursor      = 'not-allowed';
                    btn.onclick           = () => showLockedWarning(n);
                }
            }

            document.getElementById('comp-count').textContent = completedCount;
            document.getElementById('progress-fill').style.width = (completedCount / 12 * 100) + '%';
        }

        function goToLevel(n) {
            const state = getState();
            const isUnlocked = n === 1 || state.levels?.[n - 1]?.completed === true;

            if (!isUnlocked) {
                showLockedWarning(n);
                return;
            }

            state.currentLevel = n;
            state.lastPlayed = Date.now();
            saveState(state);

            glitchTransition(() => {
                window.location.href = 'level' + n + '.html';
            });
        }

        function showLockedWarning(n) {
            const msg = document.getElementById('lock-warning');
            if (!msg) {
                const el = document.createElement('div');
                el.id = 'lock-warning';
                el.style.cssText = `
                    position: fixed;
                    bottom: 80px;
                    left: 50%;
                    transform: translateX(-50%);
                    background: rgba(4,18,44,0.95);
                    border: 1px solid rgba(255,51,85,0.5);
                    color: #ff3355;
                    font-family: 'Share Tech Mono', monospace;
                    font-size: 0.8rem;
                    letter-spacing: 0.12em;
                    padding: 0.7rem 1.8rem;
                    border-radius: 5px;
                    z-index: 9999;
                    opacity: 0;
                    transition: opacity 0.3s ease;
                    pointer-events: none;
                `;
                document.body.appendChild(el);
            }
            const warning = document.getElementById('lock-warning');
            warning.textContent = 'LEVEL ' + n + ' LOCKED — Complete Level ' + (n - 1) + ' first.';
            warning.style.opacity = '1';
            setTimeout(() => warning.style.opacity = '0', 2200);
        }

        function glitchTransition(cb) {
            const ov = document.getElementById('glitch-overlay');
            ov.innerHTML = ''; ov.classList.add('active');
            
            for (let i = 0; i < 18; i++) {
                const b = document.createElement('div');
                b.className = 'glitch-bar';
                b.style.cssText = `
                    top: ${Math.random() * 100}vh;
                    height: ${1 + Math.random() * 8}px;
                    background: ${Math.random() > 0.5 ? 'var(--green)' : '#00ccff'};
                    animation: glitchBar ${60 + Math.random() * 100}ms ${Math.random() * 200}ms ease both;
                `;
                ov.appendChild(b);
            }

            setTimeout(() => {
                ov.classList.remove('active');
                if (cb) cb();
            }, 380);
        }

        function updateClock() {
            const n = new Date();
            const pad = (v) => String(v).padStart(2, '0');
            document.getElementById('status-clock').textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
        }

        function initParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 35; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = (6 + Math.random() * 12) + 's';
                p.style.animationDelay = (Math.random() * 6) + 's';
                p.style.width = p.style.height = (Math.random() > 0.5 ? 2 : 3) + 'px';
                container.appendChild(p);
            }
        }

        window.onload = () => {
            initHub();
            updateClock();
            setInterval(updateClock, 1000);
            initParticles();
        };
    </script>
</body>
</html>
